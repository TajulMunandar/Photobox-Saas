<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9333ea" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
  </defs>
  <!-- Polaroid frame 1 (behind) -->
  <rect x="90" y="80" width="240" height="280" rx="24" transform="rotate(-12 210 220)" fill="url(#logo-grad)" opacity="0.4" />
  <rect x="110" y="100" width="200" height="200" rx="12" transform="rotate(-12 210 220)" fill="#ffffff" opacity="0.3" />
  
  <!-- Polaroid frame 2 (front) -->
  <rect x="182" y="112" width="240" height="280" rx="24" transform="rotate(8 302 252)" fill="url(#logo-grad)" />
  <!-- Inner photo area -->
  <rect x="202" y="132" width="200" height="200" rx="12" transform="rotate(8 302 252)" fill="#ffffff" />
  
  <!-- Lens inside front frame representing camera in photo -->
  <circle cx="302" cy="232" r="50" fill="url(#logo-grad)" />
  <circle cx="302" cy="232" r="20" fill="#ffffff" />
  <circle cx="320" cy="214" r="8" fill="#ffffff" opacity="0.8" />
</svg>
